# Workflow name shown in the GitHub Actions UI
name: Build and Push Docker Image

# Trigger this workflow whenever code is pushed to the main branch
on:
  push:
    branches: ["main"]

jobs:
  docker:

    # Use the latest Ubuntu runner provided by GitHub
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository so the workflow can access the source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Docker Buildx
      # Buildx enables advanced Docker build features such as multi-platform builds and caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Log in to Docker Hub using credentials stored as GitHub Secrets
      # This is required in order to push the built image to the Docker Hub registry
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 4: Build the Docker image and push it to Docker Hub
      # The image will be tagged as: <dockerhub-username>/ts6-viewer:latest
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ts6-viewer:latest