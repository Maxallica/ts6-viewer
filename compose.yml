version: "3.9"

services:
  ts6viewer:
    image: ts6viewer:latest
    container_name: ts6viewer
    ports:
      - "9000:8080"

    environment:
      SERVER_PORT: "8080"
      THEME: "dark"
      REFRESH_INTERVAL: "60"

      # WebQuery (REST API)
      BASE_URL: "http://192.168.178.2:10080"
      API_KEY: ""

      # ServerQuery (SSH)
      HOST: "192.168.178.2"
      PORT: "10022"
      USER: "serveradmin"
      PASSWORD: ""

      # Mode: webquery OR serverquery
      MODE: "webquery"

      # Detailed client info (mute/audio/platform/etc.)
      ENABLE_DETAILED_CLIENT_INFO: "true"

      # Virtual server ID
      SERVER_ID: "1"

    restart: unless-stopped
